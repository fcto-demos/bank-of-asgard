name: PR Builder

on:
  pull_request:
    branches: [main, asgardeo]

jobs:
  setup-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18 ]
        pnpm-version: [ 8 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: 🥡 Setup pnpm
        id: setup-pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false

      - name: Install dependencies
        run: pnpm install

      - name: Build Frontend application
        working-directory: app
        run: pnpm run build

  lint-and-scan:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [ 18 ]
        pnpm-version: [ 8 ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ matrix.pnpm-version }}
          run_install: false

      - name: Install JS dependencies
        run: pnpm install

      # ── JavaScript / React ──────────────────────────────────────────────

      - name: Lint frontend (ESLint + security)
        working-directory: app
        run: pnpm run lint

      - name: Audit frontend dependencies
        working-directory: app
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint server (ESLint + security)
        working-directory: server
        run: pnpm run lint

      - name: Audit server dependencies
        working-directory: server
        run: npm audit --audit-level=high
        continue-on-error: true

      # ── Python ──────────────────────────────────────────────────────────

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python lint/security tools
        run: pip install ruff bandit pip-audit

      - name: Ruff — lint Python services
        run: ruff check transactions-api/ transactions-agent/

      - name: Bandit — security scan Python services
        run: bandit -r transactions-api/ transactions-agent/ -ll -x transactions-agent/strands_ext/

      - name: pip-audit — transactions-api dependencies
        run: pip-audit -r transactions-api/requirements.txt
        continue-on-error: true

      - name: pip-audit — transactions-agent dependencies
        run: pip-audit -r transactions-agent/requirements.txt
        continue-on-error: true

      # ── Dockerfiles ─────────────────────────────────────────────────────

      - name: Hadolint — transactions-api Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: transactions-api/Dockerfile

      - name: Hadolint — transactions-agent Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: transactions-agent/Dockerfile

      # ── Secrets ─────────────────────────────────────────────────────────

      - name: Gitleaks — secrets scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
